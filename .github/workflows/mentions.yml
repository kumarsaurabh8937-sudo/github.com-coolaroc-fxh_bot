name: Twitter Mentions to Telegram

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Send mention alert
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.CHAT_ID }}" \
            -d "text=💬 *Mention Alert!* %0A%0ASomeone mentioned @${{ secrets.SCREEN_NAME }} on Twitter.%0A%0A👉 Reply here: https://twitter.com/${{ secrets.SCREEN_NAME }}/notifications%0A%0A🏷️ #JUGAAD" \
            -d "parse_mode=Markdown"
