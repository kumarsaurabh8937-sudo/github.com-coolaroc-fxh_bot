name: Twitter to Telegram

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  send-tweets:
    runs-on: ubuntu-latest
    steps:
      - name: Send tweets to Telegram
        uses: actions/github-script@v7
        with:
          script: |
            const BOT_TOKEN = process.env.BOT_TOKEN;
            const CHAT_ID = process.env.CHAT_ID;
            const SCREEN_NAME = process.env.SCREEN_NAME;
            
            const telegramUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            const message = `📢 *New Tweet from @${SCREEN_NAME}*%0A%0A🔗 https://twitter.com/${SCREEN_NAME}`;
            
            await fetch(telegramUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
              })
            });
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SCREEN_NAME: ${{ secrets.SCREEN_NAME }}
