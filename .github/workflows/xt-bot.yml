name: Twitter to Telegram Auto

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  get-tweets:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest tweet and send to Telegram
        uses: actions/github-script@v7
        with:
          script: |
            const BOT_TOKEN = process.env.BOT_TOKEN;
            const CHAT_ID = process.env.CHAT_ID;
            const SCREEN_NAME = process.env.SCREEN_NAME;
            
            // Twitter profile URL
            const tweetUrl = `https://twitter.com/${SCREEN_NAME}`;
            
            const message = `📢 *NEW TWEET FROM @${SCREEN_NAME}*%0A%0A👇👇👇%0A%0A🔗 ${tweetUrl}%0A%0A🏷️ #JUGAAD #Solana #DesiHustle%0A%0A_Sab Bhai hain yahan!_`;
            
            const apiUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            const response = await fetch(apiUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
              })
            });
            
            const result = await response.json();
            console.log(result);
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SCREEN_NAME: ${{ secrets.SCREEN_NAME }}
