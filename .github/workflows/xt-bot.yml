name: XT-Bot - Twitter to Telegram

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run XT-Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          SCREEN_NAME: ${{ secrets.SCREEN_NAME }}
        run: |
          echo "Bot setup complete"
          echo "CHAT_ID: ${{ secrets.CHAT_ID }}"
