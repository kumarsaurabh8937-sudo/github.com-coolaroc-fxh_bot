name: Twitter to Telegram Auto

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  get-tweets:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and send latest tweet
        uses: actions/github-script@v7
        with:
          script: |
            const BOT_TOKEN = process.env.BOT_TOKEN;
            const CHAT_ID = process.env.CHAT_ID;
            const SCREEN_NAME = process.env.SCREEN_NAME;
            
            // Latest tweet URL (public accessible)
            const tweetUrl = `https://twitter.com/${SCREEN_NAME}`;
            
            const message = `📢 *Latest Tweet from @${SCREEN_NAME}*%0A%0A🔗 ${tweetUrl}%0A%0A🏷️ #JUGAAD #Solana #DesiHustle`;
            
            const apiUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            await fetch(apiUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
              })
            });
        env:
          BOT_TOKEN: ${{ secrets.Bot_token }}
          CHAT_ID: ${{ secrets.Chat_id }}
          SCREEN_NAME: ${{ secrets.Screen_name }}
